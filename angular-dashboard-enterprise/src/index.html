<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AngularDashboardEnterprise</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          // limpa a query string p= e manda para a rota original
          history.replaceState(null, '', decodeURIComponent(p));
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
